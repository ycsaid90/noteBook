# Sample workflow for building and deploying a mdbook.md site to GitHub Pages
#
# To get started with mdbook.md see: https://rust-lang.github.io/mdBook/index.html
#
name: Deploy mdbook.md site to Pages

on:
  # Runs on pushes targeting the default branch
  push:
    branches: ["main"]

  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:

# Sets permissions of the GITHUB_TOKEN to allow deployment to GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one concurrent deployment, skipping runs queued between the run in-progress and latest queued.
# However, do NOT cancel in-progress runs as we want to allow these production deployments to complete.
concurrency:
  group: "pages"
  cancel-in-progress: false

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  # Build job
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Install latest mdbook
        run: |
          tag="$(curl -fsSL 'https://api.github.com/repos/rust-lang/mdbook/releases/latest' | jq -r '.tag_name')"
          echo "tag=${tag}"
          url="https://github.com/rust-lang/mdbook/releases/download/${tag}/mdbook-${tag}-x86_64-unknown-linux-gnu.tar.gz"
          echo "url=${url}"
          mkdir -p bin
          curl -fsSL "$url" | tar -xz --directory=./bin
          chmod +x ./bin/mdbook
          echo "./bin/mdbook --version: $(./bin/mdbook --version)"
          echo "$PWD/bin" >> "$GITHUB_PATH"
      - name: Build Book
        run: |
          # This assumes your book is in the root of your repository.
          # Just add a `cd` here if you need to change to another directory.
          mdbook build
      - name: Setup Pages
        uses: actions/configure-pages@v6
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v4
        with:
          # Upload generated book output
          path: ./book

  # Deployment job
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
